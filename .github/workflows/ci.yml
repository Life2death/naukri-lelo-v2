name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend checks ───────────────────────────────────────────────────────────
  frontend:
    name: TypeScript + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Vitest tests
        run: npm test

  # ── Rust checks ───────────────────────────────────────────────────────────────
  rust-check:
    name: Rust cargo check (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpulse-dev \
            libdbus-1-dev

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --target x86_64-unknown-linux-gnu

      - name: Cargo clippy (warnings as errors)
        working-directory: src-tauri
        run: cargo clippy --target x86_64-unknown-linux-gnu -- -D warnings
        continue-on-error: true

      - name: Cargo test (unit tests)
        working-directory: src-tauri
        run: cargo test --target x86_64-unknown-linux-gnu 2>&1
