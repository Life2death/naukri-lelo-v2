<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="none" stroke="#f97316" stroke-width="1" opacity="0.08"/>
  <circle cx="950" cy="200" r="130" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="950" cy="200" r="80" fill="#f97316" opacity="0.04"/>

  <circle cx="80" cy="80" r="60" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>
  <circle cx="80" cy="320" r="40" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="60" y="120" width="5" height="160" rx="3" fill="url(#accentGrad)"/>

  <!-- Logo icon — briefcase shape -->
  <g transform="translate(85, 148)" filter="url(#glow)">
    <!-- Briefcase body -->
    <rect x="0" y="14" width="54" height="40" rx="5" fill="none" stroke="#f97316" stroke-width="2.5"/>
    <!-- Briefcase handle -->
    <path d="M 16 14 L 16 8 Q 16 4 20 4 L 34 4 Q 38 4 38 8 L 38 14" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Middle divider -->
    <line x1="0" y1="34" x2="54" y2="34" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <!-- Clasp -->
    <rect x="22" y="30" width="10" height="8" rx="2" fill="#f97316" opacity="0.9"/>
    <!-- Star / sparkle -->
    <circle cx="48" cy="10" r="3" fill="#fb923c" opacity="0.9"/>
    <circle cx="54" cy="4" r="2" fill="#fb923c" opacity="0.6"/>
    <circle cx="42" cy="5" r="1.5" fill="#fb923c" opacity="0.5"/>
  </g>

  <!-- Main Title -->
  <text x="165" y="195" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">Naukri</text>
  <text x="165" y="195" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">
    <tspan dx="5" fill="url(#accentGrad)">Lelo</tspan>
  </text>

  <!-- Tagline -->
  <text x="165" y="240" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="0.5">Free · Open Source · AI Interview Assistant · Invisible in Screen Sharing</text>

  <!-- Divider line -->
  <line x1="165" y1="262" x2="780" y2="262" stroke="#334155" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="165" y="278" width="145" height="34" rx="17" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="238" y="300" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle">🔒 100% Free</text>

  <!-- Pill 2 -->
  <rect x="320" y="278" width="155" height="34" rx="17" fill="#1e3a5f" stroke="#f97316" stroke-width="1"/>
  <text x="398" y="300" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#fdba74" text-anchor="middle">👻 Stealth Mode</text>

  <!-- Pill 3 -->
  <rect x="485" y="278" width="155" height="34" rx="17" fill="#1e3a5f" stroke="#10b981" stroke-width="1"/>
  <text x="563" y="300" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#6ee7b7" text-anchor="middle">🔑 BYOK</text>

  <!-- Pill 4 -->
  <rect x="650" y="278" width="155" height="34" rx="17" fill="#1e3a5f" stroke="#a855f7" stroke-width="1"/>
  <text x="728" y="300" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#d8b4fe" text-anchor="middle">⚡ ~10MB</text>

  <!-- Bottom tagline -->
  <text x="165" y="358" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#475569">Built with Tauri · Rust · React · TypeScript  |  Windows · macOS · Linux</text>

  <!-- Right side — Hindi text decoration -->
  <text x="870" y="210" font-family="'Noto Sans Devanagari', 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#f97316" opacity="0.12" text-anchor="middle">नौकरी</text>
  <text x="870" y="265" font-family="'Noto Sans Devanagari', 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#f97316" opacity="0.12" text-anchor="middle">लेलो</text>

  <!-- GitHub badge area -->
  <text x="870" y="175" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">github.com/Life2death/naukri-lelo</text>
</svg>
